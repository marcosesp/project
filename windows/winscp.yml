---
- name: Instalando winscp via powershell con winget
  hosts: all
  tasks:
    - name: Actualizando lista de paquetes winget
      ansible.windows.win_shell: | 
        winget source reset --force
        winget source update
      changed_when: false

    - name: Verificar que WinSCP esta instalado
      ansible.windows.win_shel: | 
        winget list --id WinSCP.WinSCP --exact
      register: winscp
      changed_when: false

    - name: Instalando wincsp
      ansible.windows.win_shell: >
        winget install --id WinSCP.WinSCP
        --silent
        --source winget
        --accept-package-agreements
        --accept-source-agreements
      when: "'WinSCP.WinSCP' not in winscp.stdout"
